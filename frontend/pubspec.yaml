name: meditrack
description: Prescription and Medication Tracking App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.6

  # Routing
  go_router: ^14.0.0

  # Dependency Injection
  get_it: ^8.0.0

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.2

  # Network - FastAPI backend
  dio: ^5.7.0

  # Local Storage
  shared_preferences: ^2.3.2
  hive_flutter: ^1.1.0

  # UI
  cupertino_icons: ^1.0.8
  flutter_screenutil: ^5.9.3

  # Utils
  equatable: ^2.0.5
  dartz: ^0.10.1
  injectable: ^2.4.4
  flutter_map: ^8.2.2
  latlong2: ^0.9.1
  geolocator: ^14.0.2
  geocoding: ^4.0.0
  url_launcher: ^6.3.2
  file_picker: ^8.1.2
  flutter_local_notifications: ^18.0.0
  timezone: ^0.9.4
  html: ^0.15.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  bloc_test: ^9.1.5
  build_runner: ^2.4.13
  injectable_generator: ^2.4.4
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true

dependency_overrides:
  test_api: 0.7.10
  analyzer: ^6.4.1
